<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#256f8f">
<title>Page not found — Daniel Olliver</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.png">
<style>
  @font-face { font-family:"Work Sans"; src:local("Work Sans"),
    url(/static/media/font.e7663f1a.ttf) format("truetype"); font-display:swap; }
  :root {
    --clr-bg:#f7f8f5; --clr-fg:#24313a; --clr-heading:#111827;
    --clr-muted:#64717d; --clr-primary:#256f8f; --clr-primary-soft:#8fc7d8;
    --clr-border:#d8ded8;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--clr-bg); color:var(--clr-fg);
    font:16px/1.65 "Work Sans",Arial,sans-serif; -webkit-font-smoothing:antialiased; }
  a { color:var(--clr-primary); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .wrap { max-width:760px; margin:0 auto; padding:80px 22px; }
  h1 { font-size:2.1rem; line-height:1.15; letter-spacing:-.4px;
       color:var(--clr-heading); margin-bottom:14px; }
  p { color:var(--clr-muted); margin-bottom:26px; }
  .cta { display:flex; flex-wrap:wrap; gap:10px; }
  .btn { display:inline-block; padding:9px 16px; border-radius:8px; font-size:.92rem;
    font-weight:500; border:1px solid transparent; }
  .btn:hover { text-decoration:none; }
  .btn-primary { background:var(--clr-primary); color:#fff; }
  .btn-primary:hover { background:#1f5d78; }
  .btn-outline { background:#fff; border-color:var(--clr-border); color:var(--clr-primary); }
  .btn-outline:hover { border-color:var(--clr-primary-soft); }
</style>
</head>
<body>
<div class="wrap">
<h1>Page not found</h1>
<p>That page doesn't exist — it may have moved.</p>
<div class="cta">
  <a class="btn btn-primary" href="/">danielolliver.com</a>
  <a class="btn btn-outline" href="/research/">Research</a>
  <a class="btn btn-outline" href="/anyons/">Anyon playground</a>
</div>
</div>
</body>
</html>
